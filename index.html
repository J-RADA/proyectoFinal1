<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>inicio</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="contenedorIndex">
   <header class="bg-primary text-white p-3 d-flex justify-content-between align-items-center">

    <div class="d-flex align-items-center gap-2">
        <div class="foto">
        <img src="imagenes/logo.jfif" alt="Logo" width="40" height="40">
        </div>
        <h1 class="h4 mb-0">Contacto Social</h1>
    </div>

    <div class="d-flex align-items-center gap-3">
        <span id="bienvenida"></span>
        <button id="cerrarSesion" class="btn btn-light btn-sm">Cerrar sesión</button>
    </div>
    
</header>
    <br>
    <main class="container mt-4">
        <div class="muro">
        <section class="card p-3 mb-4">
            <textarea name="publicaciones" id="nuevaPublicacion" placeholder="Que estas pensando"></textarea>
            <button type="button" id="publicar" class="btn btn-outline-primary">Publicar</button>

        </section>
        <section>
            <div id="feed"></div>

        </section>
        </div>
    </main>
    <footer>
        <div class="footer">
        <p>© 2026 Mi Sitio Web</p>
        </div>
    </footer>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    </div>
</body>

</html>
